<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
<meta charset="UTF-8">
<title>-</title>
<link rel="stylesheet" type="text/css" href="/search.css">
<link rel="stylesheet" type="text/css" href="/toastui-editor.min.css" />
</head>
<body>
	<header></header>
	<aside>
		<div class="panel">
			<div class="panel-header">
				<span>🔍 검색 이력</span>
				<span class="arrow">▶</span>
			</div>
			<div class="panel-content">
				<ul class="history-list">
					<li>11111111111</li>
					<li>22222222222</li>
					<li>33333333333</li>
				</ul>
			</div>
		</div>
	  
		<div class="panel">
			<div class="panel-header">
				<span>💾 저장 목록 트리</span>
				<span class="arrow">▶</span>
			</div>
			<div class="panel-content">
				<ul class="tree-list">
					<li>AAAAA
						<ul>
							<li>11111111</li>
							<li>22222222</li>
						</ul>
					</li>
					<li>BBBBB
						<ul>
							<li>11111111</li>
							<li>22222222</li>
							<li>33333333</li>
						</ul>
					</li>
				</ul>
			</div>
		</div>
	</aside>
	
	<main>
		<section class="search-area">
			<form id="searchForm">
				<select id="searchSelect" aria-label="검색 범위 선택">
					<option value="titla_content" selected>제목/내용</option>
					<option value="title">제목</option>
					<option value="content">내용</option>
				</select>
				<input type="text" id="searchInput" placeholder="검색어를 입력하세요" aria-label="검색어 입력"/>
				<button type="button" id="searchButton">검색</button>
				<button type="button" id="openButton">등록</button>
			</form>
		</section>
		<section class="results-area" aria-label="검색 결과">
			<ul id="resultsList">
				<li>결과 아이템 1</li>
				<li>결과 아이템 2</li>
				<li>결과 아이템 3</li>
			</ul>
		</section>
	</main>
	<footer></footer>
</body>

<dialog id="dialog">
	<form method="dialog">
		<div id="editor"></div>
		<button value="close">닫기</button>
		<button id="saveButton">저장</button>
	</form>
</dialog>

<script type="text/javascript" src="/toastui-editor-all.min.js"></script>
<script type="text/javascript" src="/search.js"></script>
</html>
